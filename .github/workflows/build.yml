name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

  build-linux-x86_64:
    name: Build Linux x86_64
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release --locked

      - name: Package binary
        run: |
          mkdir -p release/pkg
          cp target/release/rustpilot release/pkg/rustpilot
          tar -C release/pkg -czf release/rustpilot-x86_64-unknown-linux-gnu.tar.gz rustpilot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-x86_64-unknown-linux-gnu
          path: release/rustpilot-x86_64-unknown-linux-gnu.tar.gz
          retention-days: 30

  build-linux-arm64:
    name: Build Linux ARM64
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Add ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER: qemu-aarch64 -L /usr/aarch64-linux-gnu
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Package binary
        run: |
          mkdir -p release/pkg
          cp target/aarch64-unknown-linux-gnu/release/rustpilot release/pkg/rustpilot
          tar -C release/pkg -czf release/rustpilot-aarch64-unknown-linux-gnu.tar.gz rustpilot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-aarch64-unknown-linux-gnu
          path: release/rustpilot-aarch64-unknown-linux-gnu.tar.gz
          retention-days: 30

  build-macos-x86_64:
    name: Build macOS x86_64
    needs: quality
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: x86_64-apple-darwin

      - name: Build release
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p release/pkg
          cp target/x86_64-apple-darwin/release/rustpilot release/pkg/rustpilot
          tar -C release/pkg -czf release/rustpilot-x86_64-apple-darwin.tar.gz rustpilot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-x86_64-apple-darwin
          path: release/rustpilot-x86_64-apple-darwin.tar.gz
          retention-days: 30

  build-macos-arm64:
    name: Build macOS ARM64
    needs: quality
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: aarch64-apple-darwin

      - name: Build release
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p release/pkg
          cp target/aarch64-apple-darwin/release/rustpilot release/pkg/rustpilot
          tar -C release/pkg -czf release/rustpilot-aarch64-apple-darwin.tar.gz rustpilot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-aarch64-apple-darwin
          path: release/rustpilot-aarch64-apple-darwin.tar.gz
          retention-days: 30

  build-windows-x86_64:
    name: Build Windows x86_64
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/rustpilot.exe release/rustpilot-x86_64-pc-windows-msvc.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-x86_64-pc-windows-msvc
          path: release/rustpilot-x86_64-pc-windows-msvc.exe
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos-x86_64
      - build-macos-arm64
      - build-windows-x86_64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          mkdir -p release
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp artifacts/rustpilot-x86_64-unknown-linux-gnu/rustpilot-x86_64-unknown-linux-gnu.tar.gz \
            release/rustpilot-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          cp artifacts/rustpilot-aarch64-unknown-linux-gnu/rustpilot-aarch64-unknown-linux-gnu.tar.gz \
            release/rustpilot-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz
          cp artifacts/rustpilot-x86_64-apple-darwin/rustpilot-x86_64-apple-darwin.tar.gz \
            release/rustpilot-v${VERSION}-x86_64-apple-darwin.tar.gz
          cp artifacts/rustpilot-aarch64-apple-darwin/rustpilot-aarch64-apple-darwin.tar.gz \
            release/rustpilot-v${VERSION}-aarch64-apple-darwin.tar.gz
          cp artifacts/rustpilot-x86_64-pc-windows-msvc/rustpilot-x86_64-pc-windows-msvc.exe \
            release/rustpilot-v${VERSION}-x86_64-pc-windows-msvc.exe
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          name: Rustpilot v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
