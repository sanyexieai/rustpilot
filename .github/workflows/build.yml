name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 构建 Linux x86_64
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Build release
        run: cargo build --release --locked

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/rustpilot release/rustpilot-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-linux-x86_64
          path: release/rustpilot-linux-x86_64
          retention-days: 30

  # 构建 Linux ARM64
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Add ARM64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER: qemu-aarch64 -L /usr/aarch64-linux-gnu
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Package binary
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/rustpilot release/rustpilot-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-linux-arm64
          path: release/rustpilot-linux-arm64
          retention-days: 30

  # 构建 macOS x86_64
  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build release
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p release
          cp target/x86_64-apple-darwin/release/rustpilot release/rustpilot-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-macos-x86_64
          path: release/rustpilot-macos-x86_64
          retention-days: 30

  # 构建 macOS ARM64 (Apple Silicon)
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build release
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/rustpilot release/rustpilot-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-macos-arm64
          path: release/rustpilot-macos-arm64
          retention-days: 30

  # 构建 Windows x86_64
  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Build release
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/rustpilot.exe release/rustpilot-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustpilot-windows-x86_64
          path: release/rustpilot-windows-x86_64.exe
          retention-days: 30

  # 创建 Release（仅在 tag 推送时运行）
  release:
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-x86_64, build-macos-arm64, build-windows-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Linux x86_64
          cp artifacts/rustpilot-linux-x86_64/rustpilot-linux-x86_64 release/
          # Linux ARM64
          cp artifacts/rustpilot-linux-arm64/rustpilot-linux-arm64 release/
          # macOS x86_64
          cp artifacts/rustpilot-macos-x86_64/rustpilot-macos-x86_64 release/
          # macOS ARM64
          cp artifacts/rustpilot-macos-arm64/rustpilot-macos-arm64 release/
          # Windows x86_64
          cp artifacts/rustpilot-windows-x86_64/rustpilot-windows-x86_64.exe release/
          # List files
          ls -la release/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          name: Rustpilot v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
